<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My Space | The Paris Lunchers Club</title>
<link rel="preload" as="image" href="assets/fork-cursor.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<!-- Leaflet for map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="db.js"></script>

<style>
:root {
  --bg: #0A0A09;
  --ink: #F4F1EA;
  --muted: #6E6B64;
  --muted-2: #A09B91;
  --line: #1F1E1B;
  --field: #131211;
  --field-line: #2A2925;
  --ok: #4F9B65;
  --warn: #B58A3C;
  --danger: #C8513E;
  --accent: #C9A37A;

  --sans: "Inter", ui-sans-serif, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  --display: "Geist", ui-sans-serif, -apple-system, sans-serif;
  --serif: "Instrument Serif", "Iowan Old Style", Georgia, serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
*, *::before, *::after { cursor: url("assets/fork-cursor.png") 32 4, auto !important; }

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============ Shell ============ */
.top-bar {
  position: sticky; top: 0; z-index: 90;
  display: flex; align-items: center; justify-content: center;
  padding: 18px 20px;
  background: var(--bg);
  border-bottom: 1px solid var(--line);
}
.top-bar .mark {
  font-family: var(--display);
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--muted);
}

.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  display: flex; height: 72px;
  background: var(--bg);
  border-top: 1px solid var(--line);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 5px;
  background: none; border: none;
  font-family: var(--sans);
  font-size: 9.5px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--muted);
  transition: color 0.2s;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  -webkit-tap-highlight-color: transparent;
}
.tab.active { color: var(--ink); }
.tab svg { opacity: 0.5; transition: opacity 0.2s; }
.tab.active svg { opacity: 1; }

/* ============ Pages ============ */
.page { display: none; padding: 28px 20px 100px; max-width: 560px; margin: 0 auto; }
.page.active { display: block; }

/* ============ Typography ============ */
.greeting h1 {
  font-family: var(--display);
  font-size: 32px; font-weight: 500;
  letter-spacing: -0.025em;
  line-height: 1.15;
  margin-top: 6px;
}
.italic { font-family: var(--serif); font-style: italic; font-weight: 400; }
.eyebrow {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--muted);
}
.help {
  font-size: 14px; color: var(--muted-2); margin-top: 8px; line-height: 1.5;
}
.muted { color: var(--muted); font-size: 13px; }

/* ============ Animation ============ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.45s ease both; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-4px); }
  40%, 80% { transform: translateX(4px); }
}
.shake { animation: shake 0.35s ease; }

/* ============ Stat cards ============ */
.stat-cards {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-top: 24px;
}
.stat-card {
  background: var(--field);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 20px;
}
.stat-card .number {
  font-family: var(--display);
  font-size: 38px; font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1;
}
.stat-card .number .small {
  font-size: 20px; font-weight: 400;
  color: var(--muted);
}
.stat-card .label {
  font-size: 11px; color: var(--muted);
  margin-top: 6px;
  letter-spacing: 0.04em;
}
.stat-card.subtle {
  background: transparent;
  border-color: var(--line);
}
.stat-card.subtle .number { font-size: 28px; }

/* ============ Sections ============ */
.section { margin-top: 36px; }
.section-head {
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 16px;
}
.profile-section { margin-top: 32px; }
.profile-section .section-head { margin-bottom: 0; }

/* ============ Empty / CTA card ============ */
.empty-card {
  background: var(--field);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 24px;
}
.empty-card p { font-size: 14px; line-height: 1.55; }
.empty-card .muted { margin-top: 4px; }

.btn-action {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--ink); color: var(--bg);
  border: none; border-radius: 10px;
  font-family: var(--sans);
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 14px 22px;
  margin-top: 18px;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  transition: opacity 0.18s;
}
.btn-action:hover { opacity: 0.88; }
.btn-action .arrow { display: inline-block; transition: transform 0.2s; }
.btn-action:hover .arrow { transform: translateX(3px); }

/* ============ Connection cards ============ */
.connection-card {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--line);
}
.connection-card:last-child { border-bottom: none; }
.avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--field); border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display);
  font-size: 14px; font-weight: 500;
  color: var(--muted-2);
  flex-shrink: 0;
}
.connection-card .info { flex: 1; min-width: 0; }
.connection-card .name { font-weight: 500; font-size: 14px; }
.connection-card .meta {
  font-size: 12px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.connection-card .date {
  font-size: 11px; color: var(--muted);
  flex-shrink: 0; text-align: right;
}

/* ============ Week grid ============ */
.week-grid {
  display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;
  margin-top: 24px;
}
.day-card {
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 0 10px;
  background: var(--field);
  border: 1px solid var(--line);
  border-radius: 12px;
  font-family: var(--sans);
  transition: all 0.2s;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  -webkit-tap-highlight-color: transparent;
}
.day-card:not([disabled]):hover {
  border-color: color-mix(in oklch, var(--ink) 30%, var(--line));
}
.day-card.selected {
  border-color: var(--ok);
  background: color-mix(in oklch, var(--ok) 8%, var(--field));
}
.day-card.weekend {
  opacity: 0.3;
  cursor: default !important;
}
.day-name {
  font-size: 9px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--muted);
}
.day-num {
  font-family: var(--display);
  font-size: 20px; font-weight: 500;
  margin-top: 4px;
}
.day-check {
  font-size: 12px; color: var(--ok);
  height: 16px; margin-top: 4px;
}

.month-counter {
  text-align: center;
  font-size: 12px; color: var(--muted);
  margin-top: 14px;
  letter-spacing: 0.04em;
}
.month-counter span {
  font-family: var(--display);
  font-weight: 600; color: var(--ink);
}

/* ============ Map ============ */
.map-wrap {
  width: 100%; height: 280px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--line);
}
.map-wrap .leaflet-control-attribution { display: none; }

.radius-selector {
  display: flex; gap: 8px;
  margin-top: 12px;
}
.radius-btn {
  flex: 1;
  background: var(--field);
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 12px; font-weight: 500;
  padding: 10px;
  text-align: center;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  transition: all 0.2s;
}
.radius-btn:hover { border-color: var(--muted); color: var(--ink); }
.radius-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: color-mix(in oklch, var(--accent) 8%, var(--field));
}

/* ============ Profile rows ============ */
.profil-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 13px 0;
  border-bottom: 1px solid var(--line);
  font-size: 13.5px;
}
.profil-row .k {
  color: var(--muted);
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.06em;
  flex-shrink: 0; min-width: 100px;
}
.profil-row .v {
  text-align: right;
  color: var(--ink);
  word-break: break-word;
}

.btn-logout {
  display: block; width: 100%;
  background: none;
  border: 1px solid var(--danger);
  border-radius: 10px;
  color: var(--danger);
  font-family: var(--sans);
  font-size: 13px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 14px;
  margin-top: 20px;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  transition: all 0.18s;
}
.btn-logout:hover {
  background: color-mix(in oklch, var(--danger) 10%, transparent);
}

/* ============ Loading ============ */
.loading {
  text-align: center; padding: 40px;
  color: var(--muted); font-size: 13px;
}

/* ============ Autofill kill ============ */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus {
  -webkit-box-shadow: 0 0 0 1000px var(--field) inset !important;
  -webkit-text-fill-color: var(--ink) !important;
  transition: background-color 9999s ease-out 0s, color 9999s ease-out 0s;
}

/* ============ Responsive ============ */
@media (max-width: 768px) {
  .greeting h1 { font-size: 28px; }
  .stat-card .number { font-size: 32px; }
  .stat-card.subtle .number { font-size: 24px; }
  .day-num { font-size: 17px; }
  .day-name { font-size: 8px; }
  .map-wrap { height: 240px; }
}

@media (max-width: 380px) {
  .week-grid { gap: 5px; }
  .day-card { padding: 10px 0 8px; }
  .day-num { font-size: 15px; }
}
</style>
</head>

<body>
<img src="assets/fork-cursor.png" alt="" aria-hidden="true" style="position:fixed; left:-9999px; top:-9999px; width:1px; height:1px; opacity:0; pointer-events:none;" />

<!-- ============ Top bar ============ -->
<header class="top-bar">
  <div class="mark">The Paris Lunchers Club</div>
</header>

<!-- ============ Pages ============ -->

<section class="page active" data-page="home" id="homePage">
  <div class="loading">Chargement...</div>
</section>

<section class="page" data-page="week" id="weekPage"></section>

<section class="page" data-page="carnet" id="carnetPage"></section>

<section class="page" data-page="profil" id="profilPage"></section>

<!-- ============ Tab bar ============ -->
<nav class="tab-bar">
  <button class="tab active" data-page="home">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12l9-8 9 8v9a1 1 0 01-1 1H4a1 1 0 01-1-1v-9z"/>
    </svg>
    <span>Home</span>
  </button>
  <button class="tab" data-page="week">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2"/>
      <line x1="3" y1="10" x2="21" y2="10"/>
      <line x1="8" y1="2" x2="8" y2="6"/>
      <line x1="16" y1="2" x2="16" y2="6"/>
    </svg>
    <span>Week</span>
  </button>
  <button class="tab" data-page="carnet">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/>
      <circle cx="9" cy="7" r="4"/>
      <path d="M23 21v-2a4 4 0 00-3-3.87"/>
      <path d="M16 3.13a4 4 0 010 7.75"/>
    </svg>
    <span>Contacts</span>
  </button>
  <button class="tab" data-page="profil">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="4"/>
      <path d="M20 21v-2a8 8 0 00-16 0v2"/>
    </svg>
    <span>Profile</span>
  </button>
</nav>

<script src="member-dashboard.js"></script>
</body>
</html>
