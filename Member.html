<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Le Carnet | Lunchers Club</title>
<link rel="preload" as="image" href="assets/fork-cursor.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<!-- Leaflet for map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="db.js"></script>

<style>
:root {
  /* Color */
  --bg: #0A0A09;
  --ink: #F4F1EA;
  --muted: #6E6B64;
  --muted-2: #A09B91;
  --line: #1F1E1B;
  --field: #131211;
  --field-line: #2A2925;
  --ok: #4F9B65;
  --warn: #B58A3C;
  --danger: #C8513E;
  --accent: #C9A37A;           /* legacy, unused on member surfaces */
  --claret: #5C2A2D;           /* used only on Patron chip + served-day */

  /* Type */
  --sans: "Inter", ui-sans-serif, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  --display: "Geist", ui-sans-serif, -apple-system, sans-serif;
  --serif: "Instrument Serif", "Iowan Old Style", Georgia, serif;
  --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;

  /* Layout */
  --page-max: 760px;
  --space-section: 56px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
*, *::before, *::after { cursor: url("assets/fork-cursor.png") 32 4, auto !important; }

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============ APP SHELL ============ */
.app-shell {
  display: grid;
  grid-template-columns: 200px 1fr;
  min-height: 100vh;
}
.rail {
  border-right: 1px solid var(--line);
  padding: 26px 16px 22px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: sticky;
  top: 0;
  height: 100vh;
  background: #0B0B0A;
}
.rail .brand {
  font-family: var(--display);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  padding: 4px 10px 20px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 18px;
  line-height: 1.3;
}
.rail .brand .sub {
  display: block;
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 0.02em;
  text-transform: none;
  color: var(--muted);
  margin-top: 8px;
}
.rail-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 10px;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--muted-2);
  font-weight: 500;
  background: transparent;
  border: 0;
  text-align: left;
  width: 100%;
  transition: background 0.18s ease, color 0.18s ease;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
}
.rail-item:hover { color: var(--ink); background: color-mix(in oklch, var(--ink) 4%, transparent); }
.rail-item.active {
  color: var(--ink);
  background: color-mix(in oklch, var(--ink) 7%, transparent);
}
.rail-item .glyph {
  display: inline-flex;
  width: 18px; height: 18px;
  align-items: center; justify-content: center;
  color: currentColor;
}
.rail-item .label-text { flex: 1; }

.rail .rail-foot {
  margin-top: auto;
  padding-top: 18px;
  border-top: 1px solid var(--line);
}
.rail .rail-who {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--muted-2);
  padding: 4px 10px 8px;
}
.rail .rail-logout-link {
  appearance: none;
  border: 0;
  background: transparent;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 6px 10px;
  text-align: left;
  width: 100%;
  border-radius: 6px;
  transition: color 0.2s ease;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
}
.rail .rail-logout-link:hover { color: var(--ink); }

.workspace { min-width: 0; position: relative; }

/* ============ Pages ============ */
.page {
  display: none;
  padding: 56px 40px 96px;
  max-width: var(--page-max);
  margin: 0 auto;
}
.page.active { display: block; }

/* ============ Editorial typography ============ */
.eyebrow {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--muted);
}
.italic { font-family: var(--serif); font-style: italic; font-weight: 400; }
.muted { color: var(--muted); }
.muted-2 { color: var(--muted-2); }

.page-title {
  font-family: var(--display);
  font-size: 40px;
  font-weight: 500;
  letter-spacing: -0.028em;
  line-height: 1.08;
  margin-top: 10px;
}
.page-title .italic { font-weight: 400; }

.page-tagline {
  font-family: var(--serif);
  font-style: italic;
  font-size: 16px;
  color: var(--muted-2);
  margin-top: 16px;
  line-height: 1.5;
  max-width: 540px;
}

/* ============ Sections ============ */
.section { margin-top: var(--space-section); }
.section-head {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 22px;
}
.section-title {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 500;
  letter-spacing: -0.012em;
}
.section-aside {
  font-family: var(--sans);
  font-size: 12px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
}

/* ============ Animations ============ */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
.slide-up { animation: slideUp 0.5s ease both; animation-delay: var(--delay, 0ms); }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-4px); }
  40%, 80% { transform: translateX(4px); }
}
.shake { animation: shake 0.35s ease; }

/* ============ Today — Next lunch card ============ */
.next-lunch {
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 26px 28px 28px;
}
.next-lunch .restaurant {
  font-family: var(--serif);
  font-style: italic;
  font-size: 28px;
  line-height: 1.15;
  color: var(--ink);
}
.next-lunch .when {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 14px;
}
.next-lunch .with {
  display: flex; align-items: center; gap: 14px;
  margin-top: 22px;
}
.next-lunch .with .avatar { filter: blur(7px); transform: scale(0.96); }
.next-lunch .with .name {
  font-family: var(--display);
  font-size: 16px;
  font-weight: 500;
}
.next-lunch .with .reveal {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.04em;
  margin-top: 2px;
}
.next-lunch .editorial {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--muted-2);
  margin-top: 20px;
  line-height: 1.55;
}

.next-lunch-empty {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  color: var(--muted-2);
  line-height: 1.55;
  max-width: 480px;
}

/* ============ Today — Week grid ============ */
.week-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}
.day-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 22px 0 18px;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 12px;
  font-family: var(--sans);
  transition: border-color 0.2s ease, background 0.2s ease;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.day-card:not(.selected):hover {
  border-color: color-mix(in oklch, var(--ink) 22%, var(--line));
  background: color-mix(in oklch, var(--ink) 2%, transparent);
}
.day-name {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--muted);
}
.day-num {
  font-family: var(--display);
  font-size: 24px;
  font-weight: 500;
  margin-top: 8px;
  color: var(--ink);
  line-height: 1;
}
.day-status {
  font-family: var(--serif);
  font-style: italic;
  font-size: 12px;
  color: var(--muted);
  margin-top: 8px;
  transition: color 0.2s ease;
  line-height: 1;
}
.day-card.selected .day-status {
  color: var(--claret);
  font-weight: 500;
}
.day-card.selected {
  border-color: color-mix(in oklch, var(--claret) 35%, var(--line));
  background: color-mix(in oklch, var(--claret) 4%, transparent);
}

/* ============ Today — Map ============ */
.map-wrap {
  width: 100%;
  height: 180px;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--line);
  position: relative;
}
.map-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 24px;
  background: linear-gradient(to bottom, var(--bg), transparent);
  z-index: 400;
  pointer-events: none;
}
.map-wrap .leaflet-control-attribution { display: none; }

.radius-selector {
  display: flex; gap: 8px;
  margin-top: 12px;
}
.radius-btn {
  flex: 1;
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 500;
  padding: 10px;
  text-align: center;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  transition: all 0.2s ease;
}
.radius-btn:hover { border-color: color-mix(in oklch, var(--ink) 20%, var(--line)); color: var(--ink); }
.radius-btn.active {
  border-color: var(--ink);
  color: var(--ink);
  background: color-mix(in oklch, var(--ink) 4%, transparent);
}

/* ============ Room — Connection cards ============ */
.connection-card {
  display: flex;
  align-items: flex-start;
  gap: 16px;
  padding: 18px 8px;
  border-bottom: 1px solid var(--line);
  transition: background 0.15s ease, padding-left 0.15s ease;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
}
.connection-card:hover {
  background: color-mix(in oklch, var(--ink) 2.5%, transparent);
  padding-left: 14px;
}
.connection-card:last-child { border-bottom: 0; }
.connection-card .info { flex: 1; min-width: 0; }
.connection-card .name {
  font-family: var(--display);
  font-size: 16px;
  font-weight: 500;
}
.connection-card .meta {
  font-size: 13px;
  color: var(--muted-2);
  margin-top: 2px;
}
.connection-card .from {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 8px;
}
.connection-card .date {
  font-size: 11px;
  color: var(--muted);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  margin-top: 2px;
}

/* Avatar palette (kept) */
.avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--field); border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display);
  font-size: 14px; font-weight: 500;
  color: var(--muted-2);
  flex-shrink: 0;
}
.av-0 { background: color-mix(in oklch, #C9A37A 14%, var(--field)); color: #C9A37A; border-color: color-mix(in oklch, #C9A37A 22%, var(--line)); }
.av-1 { background: color-mix(in oklch, #7A9B6E 14%, var(--field)); color: #7A9B6E; border-color: color-mix(in oklch, #7A9B6E 22%, var(--line)); }
.av-2 { background: color-mix(in oklch, #B07A8A 14%, var(--field)); color: #B07A8A; border-color: color-mix(in oklch, #B07A8A 22%, var(--line)); }
.av-3 { background: color-mix(in oklch, #7A8FB0 14%, var(--field)); color: #7A8FB0; border-color: color-mix(in oklch, #7A8FB0 22%, var(--line)); }
.av-4 { background: color-mix(in oklch, #B0836E 14%, var(--field)); color: #B0836E; border-color: color-mix(in oklch, #B0836E 22%, var(--line)); }

/* ============ Room — Recently joined ============ */
.recently-joined {
  margin-top: 64px;
  padding-top: 28px;
  border-top: 1px solid var(--line);
}
.recently-joined .label {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--muted);
  display: block;
  margin-bottom: 14px;
}
.recently-joined .body {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  color: var(--muted-2);
  line-height: 1.8;
}

/* ============ Room — Right-rail spread ============ */
.rail-spread-backdrop {
  position: fixed; inset: 0;
  background: color-mix(in oklch, #000 60%, transparent);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.32s ease;
  z-index: 199;
}
.rail-spread-backdrop.visible { opacity: 1; pointer-events: auto; }

.rail-spread {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 380px;
  max-width: 92vw;
  background: #0c0c0b;
  border-left: 1px solid var(--line);
  padding: 36px 32px 32px;
  transform: translateX(100%);
  transition: transform 0.32s ease;
  z-index: 200;
  overflow-y: auto;
}
.rail-spread.open { transform: translateX(0); }
.rail-spread .close {
  position: absolute; top: 18px; right: 22px;
  background: none; border: 0;
  font-family: var(--display);
  font-size: 22px;
  color: var(--muted);
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
}
.rail-spread .close:hover { color: var(--ink); }
.rail-spread .spread-eyebrow {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--muted);
}
.rail-spread .spread-name {
  font-family: var(--display);
  font-size: 28px;
  font-weight: 500;
  letter-spacing: -0.02em;
  margin-top: 10px;
}
.rail-spread .spread-meta {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  color: var(--muted-2);
  margin-top: 4px;
  line-height: 1.5;
}
.rail-spread .spread-block {
  margin-top: 32px;
  padding-top: 22px;
  border-top: 1px solid var(--line);
}
.rail-spread .spread-block .k {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.rail-spread .spread-block .v {
  font-family: var(--sans);
  font-size: 14px;
  color: var(--ink);
  line-height: 1.55;
}
.rail-spread .spread-block .v.italic {
  font-family: var(--serif);
  font-style: italic;
  color: var(--muted-2);
}
.rail-spread .spread-note {
  margin-top: 36px;
  padding: 14px 16px;
  border: 1px dashed color-mix(in oklch, var(--ink) 12%, var(--line));
  border-radius: 10px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--muted);
  text-align: center;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  transition: color 0.2s, border-color 0.2s;
}
.rail-spread .spread-note:hover {
  color: var(--ink);
  border-color: color-mix(in oklch, var(--ink) 28%, var(--line));
}

/* ============ Le Carnet — Membership card ============ */
.member-card {
  position: relative;
  border-radius: 14px;
  padding: 32px 30px 26px;
  background:
    linear-gradient(135deg,
      color-mix(in oklch, var(--ink) 5%, var(--field)) 0%,
      var(--field) 60%,
      color-mix(in oklch, var(--bg) 60%, var(--field)) 100%);
  border: 1px solid color-mix(in oklch, var(--ink) 6%, var(--line));
  margin-top: 8px;
  overflow: hidden;
  isolation: isolate;
}
.member-card::before {
  /* subtle paper grain */
  content: '';
  position: absolute; inset: 0;
  background-image:
    radial-gradient(circle at 18% 24%, rgba(244,241,234,0.025) 0, transparent 35%),
    radial-gradient(circle at 82% 76%, rgba(244,241,234,0.018) 0, transparent 38%),
    radial-gradient(circle at 60% 12%, rgba(244,241,234,0.012) 0, transparent 30%);
  pointer-events: none;
  z-index: 0;
}
.member-card .watermark {
  position: absolute;
  right: -28px;
  bottom: -80px;
  font-family: var(--serif);
  font-style: italic;
  font-size: 280px;
  line-height: 1;
  color: color-mix(in oklch, var(--ink) 3.5%, transparent);
  pointer-events: none;
  z-index: 0;
  user-select: none;
}
.member-card > * { position: relative; z-index: 1; }
.member-card .card-eyebrow {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.34em;
  text-transform: uppercase;
  color: var(--muted);
}
.member-card .card-name {
  font-family: var(--display);
  font-size: 38px;
  font-weight: 500;
  letter-spacing: -0.028em;
  line-height: 1.05;
  margin-top: 14px;
}
.member-card .card-since {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  color: var(--muted-2);
  margin-top: 8px;
}
.member-card .card-code {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 36px;
}
.member-card .card-chip {
  position: absolute;
  top: 24px;
  right: 24px;
  font-family: var(--sans);
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 4px;
  z-index: 2;
}
.member-card .card-chip.standard {
  color: var(--muted-2);
  border: 1px solid color-mix(in oklch, var(--ink) 16%, var(--line));
  background: transparent;
}
.member-card .card-chip.patron {
  color: var(--ink);
  background: var(--claret);
}

/* ============ Le Carnet — Typed letter details ============ */
.detail-block { margin-top: 8px; }
.detail-line {
  font-size: 15px;
  line-height: 1.95;
  color: var(--ink);
  border-bottom: 1px solid color-mix(in oklch, var(--line) 60%, transparent);
  padding: 4px 0;
  display: flex; align-items: baseline; gap: 8px;
}
.detail-line:last-child { border-bottom: 0; }
.detail-line .k {
  font-family: var(--serif);
  font-style: italic;
  color: var(--muted-2);
  flex-shrink: 0;
}
.detail-line .v {
  font-family: var(--sans);
  color: var(--ink);
  flex: 1;
}
.detail-line .pencil {
  opacity: 0;
  color: var(--muted);
  font-size: 12px;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  transition: opacity 0.18s ease, color 0.18s ease;
}
.detail-line:hover .pencil { opacity: 1; }
.detail-line .pencil:hover { color: var(--ink); }

.credits-line {
  font-family: var(--serif);
  font-style: italic;
  font-size: 14px;
  color: var(--muted-2);
  margin-top: 12px;
}

/* ============ Le Carnet — Invitations ============ */
.invite-headline {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.018em;
  margin-bottom: 6px;
}
.invite-quota-line {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  color: var(--muted-2);
  margin-bottom: 20px;
}

.invite-form-compact {
  display: grid;
  grid-template-columns: 1fr 1fr 1.4fr auto;
  gap: 8px;
  align-items: stretch;
}
.invite-form-compact input {
  background: transparent;
  border: 0;
  border-bottom: 1px solid var(--field-line);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  padding: 10px 4px 9px;
  outline: none;
  transition: border-color 0.2s;
}
.invite-form-compact input:focus { border-bottom-color: var(--ink); }
.invite-form-compact input::placeholder { color: var(--muted); }
.invite-form-compact .submit-link {
  background: none;
  border: 0;
  border-bottom: 1px solid var(--ink);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 13px;
  letter-spacing: 0.02em;
  padding: 0 8px 9px;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  transition: color 0.2s, border-color 0.2s, opacity 0.2s;
}
.invite-form-compact .submit-link:hover { color: var(--muted-2); }
.invite-form-compact .submit-link:disabled { opacity: 0.35; cursor: default !important; }

.invite-error {
  font-size: 13px;
  color: var(--danger);
  margin-top: 12px;
}
.invite-link-box {
  background: var(--field);
  border: 1px solid color-mix(in oklch, var(--ink) 12%, var(--line));
  border-radius: 10px;
  padding: 14px 16px;
  margin-top: 14px;
  display: none;
}
.invite-link-box.visible { display: block; }
.invite-link-box .label {
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 8px;
}
.invite-link-box .link-row {
  display: flex; align-items: center; gap: 10px;
}
.invite-link-box .link-url {
  flex: 1;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted-2);
  word-break: break-all;
  line-height: 1.4;
}
.btn-copy {
  background: none;
  border: 0;
  border-bottom: 1px solid var(--muted);
  color: var(--muted-2);
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0 4px 3px;
  white-space: nowrap;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  transition: color 0.2s, border-color 0.2s;
}
.btn-copy:hover { color: var(--ink); border-color: var(--ink); }

.invite-list { margin-top: 28px; }
.invite-list .section-head { margin-bottom: 14px; }

.status-pill {
  display: inline-block;
  font-family: var(--sans);
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
}
.status-pill.pending   { color: var(--warn);    background: color-mix(in oklch, var(--warn) 12%, transparent); }
.status-pill.submitted { color: var(--muted-2); background: color-mix(in oklch, var(--muted-2) 12%, transparent); }
.status-pill.accepted  { color: var(--ok);      background: color-mix(in oklch, var(--ok) 12%, transparent); }
.status-pill.onboarded { color: var(--ink);     background: color-mix(in oklch, var(--ink) 10%, transparent); }
.status-pill.expired   { color: var(--danger);  background: color-mix(in oklch, var(--danger) 12%, transparent); }
.invite-expiry {
  margin-top: 2px;
  font-family: var(--mono);
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  color: var(--muted);
  letter-spacing: 0.04em;
}

/* ============ Le Carnet — Fine print ============ */
.fine-print {
  margin-top: 64px;
  padding-top: 24px;
  border-top: 1px solid var(--line);
  display: flex;
  gap: 24px;
  align-items: center;
  flex-wrap: wrap;
}
.fine-print button,
.fine-print a {
  background: none;
  border: 0;
  padding: 4px 0;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  transition: color 0.2s ease;
}
.fine-print button:hover,
.fine-print a:hover { color: var(--ink); }

/* ============ Loading ============ */
.loading {
  text-align: center; padding: 40px 0;
  color: var(--muted); font-size: 13px;
  font-family: var(--serif); font-style: italic;
}

/* ============ Autofill kill ============ */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus {
  -webkit-box-shadow: 0 0 0 1000px var(--bg) inset !important;
  -webkit-text-fill-color: var(--ink) !important;
  transition: background-color 9999s ease-out 0s, color 9999s ease-out 0s;
}

/* ============ Responsive ============ */
@media (max-width: 768px) {
  .app-shell {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr auto;
  }
  .rail {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    top: auto;
    height: auto;
    flex-direction: row;
    justify-content: space-around;
    padding: 0;
    border-right: 0;
    border-top: 1px solid var(--line);
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .rail .brand { display: none; }
  .rail .rail-foot { display: none; }
  .rail-item {
    flex: 1;
    flex-direction: column;
    padding: 12px 0 10px;
    border-radius: 0;
    font-size: 9.5px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-align: center;
    justify-content: center;
    align-items: center;
    gap: 5px;
  }
  .rail-item .glyph { width: 22px; height: 22px; }
  .rail-item .glyph svg { width: 22px; height: 22px; }
  .rail-item .label-text { flex: none; }

  .page { padding: 32px 22px 100px; max-width: 580px; }
  .page-title { font-size: 32px; }
  .page-tagline { font-size: 15px; }
  .next-lunch .restaurant { font-size: 22px; }
  .day-num { font-size: 20px; }
  .map-wrap { height: 200px; }
  .member-card { padding: 26px 24px 22px; }
  .member-card .card-name { font-size: 30px; }
  .member-card .watermark { font-size: 200px; }
  .invite-form-compact { grid-template-columns: 1fr 1fr; }
  .invite-form-compact .submit-link { grid-column: 1 / -1; padding: 12px 0 0; border-bottom: 0; text-decoration: underline; text-underline-offset: 4px; }
  .rail-spread { width: 100%; max-width: 100%; }
}

@media (max-width: 380px) {
  .week-grid { gap: 6px; }
  .day-card { padding: 16px 0 12px; }
  .day-num { font-size: 18px; }
}
</style>
</head>

<body>
<img src="assets/fork-cursor.png" alt="" aria-hidden="true" style="position:fixed; left:-9999px; top:-9999px; width:1px; height:1px; opacity:0; pointer-events:none;" />

<div class="app-shell">

  <!-- ============ Left rail ============ -->
  <aside class="rail">
    <div class="brand">Lunchers<span class="sub" id="brandDate"></span></div>

    <button class="rail-item active" data-page="today">
      <span class="glyph">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="5" width="18" height="16" rx="2"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <line x1="8" y1="3" x2="8" y2="7"/>
          <line x1="16" y1="3" x2="16" y2="7"/>
        </svg>
      </span>
      <span class="label-text">Today</span>
    </button>

    <button class="rail-item" data-page="room">
      <span class="glyph">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="8" r="3.5"/>
          <path d="M2 21a7 7 0 0114 0"/>
          <circle cx="17" cy="9" r="2.6"/>
          <path d="M15 21a6 6 0 016-3"/>
        </svg>
      </span>
      <span class="label-text">Room</span>
    </button>

    <button class="rail-item" data-page="carnet">
      <span class="glyph">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 4h11a2 2 0 012 2v14a1 1 0 01-1 1H6a2 2 0 01-2-2V5a1 1 0 011-1z"/>
          <line x1="9" y1="9" x2="15" y2="9"/>
          <line x1="9" y1="13" x2="13" y2="13"/>
        </svg>
      </span>
      <span class="label-text">Carnet</span>
    </button>

    <div class="rail-foot">
      <div class="rail-who" id="railWho"></div>
      <button class="rail-logout-link" id="sidebarLogout">Sign out</button>
    </div>
  </aside>

  <!-- ============ Workspace ============ -->
  <main class="workspace">
    <section class="page active" data-page="today" id="todayPage">
      <div class="loading">Loading…</div>
    </section>
    <section class="page" data-page="room" id="roomPage"></section>
    <section class="page" data-page="carnet" id="carnetPage"></section>

    <!-- Right-rail spread (connection detail) -->
    <div class="rail-spread-backdrop" id="spreadBackdrop"></div>
    <aside class="rail-spread" id="railSpread" aria-hidden="true">
      <button class="close" id="spreadClose" aria-label="Close">×</button>
      <div id="spreadBody"></div>
    </aside>
  </main>

</div>

<script src="member-dashboard.js"></script>
</body>
</html>
