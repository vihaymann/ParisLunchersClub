<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>My Space | Lunchers Club</title>
<link rel="preload" as="image" href="assets/fork-cursor.png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<!-- Leaflet for map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="db.js"></script>

<style>
:root {
  --bg: #0A0A09;
  --ink: #F4F1EA;
  --muted: #6E6B64;
  --muted-2: #A09B91;
  --line: #1F1E1B;
  --field: #131211;
  --field-line: #2A2925;
  --ok: #4F9B65;
  --warn: #B58A3C;
  --danger: #C8513E;
  --accent: #C9A37A;

  --sans: "Inter", ui-sans-serif, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
  --display: "Geist", ui-sans-serif, -apple-system, sans-serif;
  --serif: "Instrument Serif", "Iowan Old Style", Georgia, serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
*, *::before, *::after { cursor: url("assets/fork-cursor.png") 32 4, auto !important; }

html, body { height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ============ APP SHELL: left rail + workspace ============ */
.app-shell {
  display: grid;
  grid-template-columns: 200px 1fr;
  min-height: 100vh;
}
.rail {
  border-right: 1px solid var(--line);
  padding: 22px 16px;
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: sticky;
  top: 0;
  height: 100vh;
  background: #0B0B0A;
}
.rail .brand {
  font-family: var(--display);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink);
  padding: 4px 10px 16px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 14px;
  line-height: 1.3;
}
.rail .brand .sub {
  display: block;
  font-family: var(--sans);
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 0.32em;
  color: var(--muted);
  margin-top: 6px;
}
.rail-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 10px;
  border-radius: 8px;
  font-size: 13px;
  color: var(--muted-2);
  font-weight: 500;
  background: transparent;
  border: 0;
  text-align: left;
  width: 100%;
  transition: background 0.18s ease, color 0.18s ease;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
}
.rail-item:hover { color: var(--ink); background: color-mix(in oklch, var(--ink) 4%, transparent); }
.rail-item.active {
  color: var(--ink);
  background: color-mix(in oklch, var(--ink) 7%, transparent);
}
.rail-item .glyph {
  display: inline-flex;
  width: 18px; height: 18px;
  align-items: center; justify-content: center;
  color: currentColor;
}
.rail-item .label-text { flex: 1; }
.rail .rail-foot {
  margin-top: auto;
  padding-top: 16px;
  border-top: 1px solid var(--line);
}
.rail .rail-who {
  font-family: var(--serif);
  font-style: italic;
  font-size: 13px;
  color: var(--muted-2);
  padding: 4px 10px 6px;
}
.rail .rail-logout {
  appearance: none;
  border: 0;
  background: transparent;
  color: var(--muted);
  font: inherit;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  padding: 10px 10px;
  text-align: left;
  width: 100%;
  border-radius: 6px;
  display: inline-flex; align-items: center; gap: 8px;
  transition: color 0.2s ease, background 0.2s ease;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
}
.rail .rail-logout:hover { color: var(--ink); background: color-mix(in oklch, var(--ink) 5%, transparent); }

.workspace { min-width: 0; }

/* ============ Pages ============ */
.page { display: none; padding: 28px 40px 60px; max-width: 720px; margin: 0 auto; }
.page.active { display: block; }

/* ============ Typography ============ */
.greeting {
  padding: 0;
}
#homePage .greeting {
  padding: 0;
}
.greeting h1 {
  font-family: var(--display);
  font-size: 32px; font-weight: 500;
  letter-spacing: -0.025em;
  line-height: 1.15;
  margin-top: 6px;
}
.greeting-sub {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  color: var(--muted-2);
  margin-top: 8px;
  opacity: 0;
  animation: fadeIn 0.6s ease 0.3s both;
}
.italic { font-family: var(--serif); font-style: italic; font-weight: 400; }
.eyebrow {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--muted);
  display: flex; align-items: center; gap: 8px;
}
.eyebrow::before {
  content: '';
  display: inline-block;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--muted);
  flex-shrink: 0;
}
.help {
  font-size: 14px; color: var(--muted-2); margin-top: 8px; line-height: 1.5;
}
.muted { color: var(--muted); font-size: 13px; }

/* ============ Animation ============ */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.45s ease both; }

@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); filter: blur(2px); }
  to { opacity: 1; transform: translateY(0); filter: blur(0); }
}
.slide-up { animation: slideUp 0.5s ease both; animation-delay: var(--delay, 0ms); }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-4px); }
  40%, 80% { transform: translateX(4px); }
}
.shake { animation: shake 0.35s ease; }

@keyframes checkPop {
  0% { transform: scale(0); opacity: 0; }
  60% { transform: scale(1.3); opacity: 1; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes cardPop {
  0% { transform: scale(1); }
  50% { transform: scale(1.06); }
  100% { transform: scale(1); }
}
.pop { animation: cardPop 0.2s ease; }

@keyframes counterPulse {
  0% { opacity: 0.6; }
  100% { opacity: 1; }
}

/* ============ Stat cards ============ */
.stat-cards {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-top: 24px;
}
.stat-card {
  background: var(--field);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 20px;
  transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
}
.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px color-mix(in oklch, var(--ink) 4%, transparent);
  border-color: color-mix(in oklch, var(--ink) 18%, var(--line));
}
.stat-card .number {
  font-family: var(--display);
  font-size: 38px; font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1;
}
.stat-card .number .small {
  font-size: 20px; font-weight: 400;
  color: var(--muted);
}
.stat-card .label {
  font-size: 11px; color: var(--muted);
  margin-top: 6px;
  letter-spacing: 0.04em;
}

/* ============ Sections ============ */
.section { margin-top: 36px; }
.section-head {
  padding-bottom: 10px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 16px;
}
.profile-section { margin-top: 32px; }
.profile-section .section-head { margin-bottom: 0; }

/* ============ Empty / CTA card ============ */
.empty-card {
  background: var(--field);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 24px;
}
.empty-card p { font-size: 14px; line-height: 1.55; }
.empty-card .muted { margin-top: 4px; }
.empty-card.placeholder {
  border-style: dashed;
  border-color: color-mix(in oklch, var(--ink) 18%, var(--line));
  text-align: center;
  padding: 32px 24px;
}
.empty-card.placeholder .empty-icon {
  display: block;
  margin: 0 auto 14px;
  opacity: 0.5;
}
.empty-card.placeholder p:first-of-type {
  font-family: var(--sans);
  font-size: 14px;
  color: var(--muted-2);
}

/* ============ Connection cards ============ */
.connection-card {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 4px 14px 12px;
  border-bottom: 1px solid var(--line);
  border-left: 2px solid transparent;
  transition: transform 0.15s ease, border-left-color 0.15s ease, background 0.15s ease;
  border-radius: 4px;
}
.connection-card:hover {
  transform: translateX(2px);
  border-left-color: var(--ink);
  background: color-mix(in oklch, var(--ink) 2%, transparent);
}
.connection-card:last-child { border-bottom: none; }
.avatar {
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--field); border: 1px solid var(--line);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--display);
  font-size: 14px; font-weight: 500;
  color: var(--muted-2);
  flex-shrink: 0;
  transition: transform 0.2s ease;
}
.connection-card:hover .avatar { transform: scale(1.05); }

/* Avatar color palette */
.av-0 { background: color-mix(in oklch, #C9A37A 15%, var(--field)); color: #C9A37A; border-color: color-mix(in oklch, #C9A37A 25%, var(--line)); }
.av-1 { background: color-mix(in oklch, #7A9B6E 15%, var(--field)); color: #7A9B6E; border-color: color-mix(in oklch, #7A9B6E 25%, var(--line)); }
.av-2 { background: color-mix(in oklch, #B07A8A 15%, var(--field)); color: #B07A8A; border-color: color-mix(in oklch, #B07A8A 25%, var(--line)); }
.av-3 { background: color-mix(in oklch, #7A8FB0 15%, var(--field)); color: #7A8FB0; border-color: color-mix(in oklch, #7A8FB0 25%, var(--line)); }
.av-4 { background: color-mix(in oklch, #B0836E 15%, var(--field)); color: #B0836E; border-color: color-mix(in oklch, #B0836E 25%, var(--line)); }
.connection-card .info { flex: 1; min-width: 0; }
.connection-card .name { font-weight: 500; font-size: 14px; }
.connection-card .meta {
  font-size: 12px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.connection-card .date {
  font-size: 11px; color: var(--muted);
  flex-shrink: 0; text-align: right;
}

/* ============ Week grid ============ */
.week-grid {
  display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
  margin-top: 24px;
}
.day-card {
  display: flex; flex-direction: column; align-items: center;
  padding: 18px 0 14px;
  background: var(--field);
  border: 1px solid var(--line);
  border-radius: 12px;
  font-family: var(--sans);
  transition: all 0.2s;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  -webkit-tap-highlight-color: transparent;
}
.day-card:not([disabled]):not(.selected):hover {
  border-color: color-mix(in oklch, var(--ink) 30%, var(--line));
  background: color-mix(in oklch, var(--ink) 3%, var(--field));
}
.day-card.selected {
  border-color: var(--ok);
  background: color-mix(in oklch, var(--ok) 8%, var(--field));
}
.day-name {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--ink);
}
.day-num {
  font-family: var(--display);
  font-size: 22px; font-weight: 500;
  margin-top: 6px;
  color: var(--ink);
}
.day-check {
  font-size: 12px; color: var(--ok);
  height: 16px; margin-top: 4px;
  display: inline-block;
}
.day-card.selected .day-check { animation: checkPop 0.3s ease both; }

.month-counter {
  text-align: center;
  font-size: 12px; color: var(--muted);
  margin-top: 14px;
  letter-spacing: 0.04em;
}
.month-counter span {
  font-family: var(--display);
  font-weight: 600; color: var(--ink);
}

/* ============ Map ============ */
.map-wrap {
  width: 100%; height: 280px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid var(--line);
  position: relative;
}
.map-wrap::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 24px;
  background: linear-gradient(to bottom, var(--bg), transparent);
  z-index: 400;
  pointer-events: none;
  border-radius: 14px 14px 0 0;
}
.map-wrap .leaflet-control-attribution { display: none; }

.radius-selector {
  display: flex; gap: 8px;
  margin-top: 12px;
}
.radius-btn {
  flex: 1;
  background: var(--field);
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--muted);
  font-family: var(--sans);
  font-size: 12px; font-weight: 500;
  padding: 10px;
  text-align: center;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  transition: all 0.2s;
}
.radius-btn:hover { border-color: var(--muted); color: var(--ink); }
.radius-btn.active {
  border-color: var(--ink);
  color: var(--ink);
  background: color-mix(in oklch, var(--ink) 5%, var(--field));
}
.rec-label {
  display: block;
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 2px;
}

/* ============ Profile rows ============ */
.profil-row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 13px 0;
  border-bottom: 1px solid var(--line);
  font-size: 13.5px;
}
.profil-row .k {
  color: var(--muted);
  font-size: 12px; font-weight: 500;
  letter-spacing: 0.06em;
  flex-shrink: 0; min-width: 100px;
}
.profil-row .v {
  text-align: right;
  color: var(--ink);
  word-break: break-word;
}

.btn-logout {
  display: block; width: 100%;
  background: none;
  border: 1px solid var(--danger);
  border-radius: 10px;
  color: var(--danger);
  font-family: var(--sans);
  font-size: 13px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 14px;
  margin-top: 20px;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  transition: all 0.18s;
}
.btn-logout:hover {
  background: color-mix(in oklch, var(--danger) 10%, transparent);
}

/* ============ Loading ============ */
.loading {
  text-align: center; padding: 40px;
  color: var(--muted); font-size: 13px;
}

/* ============ Autofill kill ============ */
input:-webkit-autofill,
input:-webkit-autofill:hover,
input:-webkit-autofill:focus {
  -webkit-box-shadow: 0 0 0 1000px var(--field) inset !important;
  -webkit-text-fill-color: var(--ink) !important;
  transition: background-color 9999s ease-out 0s, color 9999s ease-out 0s;
}

/* ============ Recommend / Invite ============ */
.invite-form {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  margin-top: 20px;
}
.invite-form .full { grid-column: 1 / -1; }
.invite-field {
  display: flex; flex-direction: column; gap: 4px;
}
.invite-field label {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--muted);
}
.invite-field input {
  background: var(--field);
  border: 1px solid var(--field-line);
  border-radius: 8px;
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  padding: 11px 14px;
  outline: none;
  transition: border-color 0.2s;
}
.invite-field input:focus {
  border-color: var(--accent);
}
.invite-field input::placeholder {
  color: var(--muted); opacity: 0.6;
}
.btn-generate {
  grid-column: 1 / -1;
  background: var(--ink);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  font-family: var(--sans);
  font-size: 13px; font-weight: 600;
  letter-spacing: 0.06em;
  padding: 14px;
  margin-top: 4px;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  transition: opacity 0.2s;
}
.btn-generate:hover { opacity: 0.88; }
.btn-generate:disabled { opacity: 0.4; cursor: default !important; }

.invite-link-box {
  background: var(--field);
  border: 1px solid var(--ok);
  border-radius: 12px;
  padding: 16px;
  margin-top: 16px;
  display: none;
}
.invite-link-box.visible { display: block; }
.invite-link-box .label {
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ok);
  margin-bottom: 8px;
}
.invite-link-box .link-row {
  display: flex; align-items: center; gap: 8px;
}
.invite-link-box .link-url {
  flex: 1;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--muted-2);
  word-break: break-all;
  line-height: 1.4;
}
.btn-copy {
  background: none;
  border: 1px solid var(--field-line);
  border-radius: 6px;
  color: var(--muted-2);
  font-family: var(--sans);
  font-size: 11px; font-weight: 500;
  letter-spacing: 0.06em;
  padding: 6px 12px;
  white-space: nowrap;
  cursor: url("assets/fork-cursor.png") 32 4, pointer !important;
  transition: color 0.2s, border-color 0.2s;
}
.btn-copy:hover { color: var(--ink); border-color: var(--muted); }

.invite-list { margin-top: 28px; }
.invite-list .section-head { margin-bottom: 0; }

.status-pill {
  display: inline-block;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
}
.status-pill.pending {
  color: var(--warn);
  background: color-mix(in oklch, var(--warn) 12%, transparent);
}
.status-pill.submitted {
  color: var(--muted-2);
  background: color-mix(in oklch, var(--muted-2) 12%, transparent);
}
.status-pill.accepted {
  color: var(--ok);
  background: color-mix(in oklch, var(--ok) 12%, transparent);
}
.status-pill.onboarded {
  color: var(--accent);
  background: color-mix(in oklch, var(--accent) 12%, transparent);
}
.status-pill.expired {
  color: var(--danger);
  background: color-mix(in oklch, var(--danger) 12%, transparent);
}
.invite-expiry {
  margin-top: 2px;
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  color: var(--muted);
  letter-spacing: 0.04em;
}

.invite-error {
  font-size: 13px;
  color: var(--danger);
  margin-top: 8px;
}

/* ============ Responsive: sidebar → bottom bar on mobile ============ */
@media (max-width: 768px) {
  .app-shell {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr auto;
  }
  .rail {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    top: auto;
    height: auto;
    flex-direction: row;
    justify-content: space-around;
    padding: 0;
    border-right: none;
    border-top: 1px solid var(--line);
    z-index: 100;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .rail .brand { display: none; }
  .rail .rail-foot { display: none; }
  .rail-item {
    flex: 1;
    flex-direction: column;
    padding: 12px 0 10px;
    border-radius: 0;
    font-size: 9.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    text-align: center;
    justify-content: center;
    align-items: center;
    gap: 5px;
  }
  .rail-item .glyph { width: 22px; height: 22px; }
  .rail-item .glyph svg { width: 22px; height: 22px; }
  .rail-item .label-text { flex: none; }

  .page { padding: 28px 20px 100px; max-width: 560px; }
  .greeting h1 { font-size: 28px; }
  .stat-card .number { font-size: 32px; }
  .day-num { font-size: 17px; }
  .day-name { font-size: 8px; }
  .map-wrap { height: 240px; }
}

@media (max-width: 380px) {
  .week-grid { gap: 5px; }
  .day-card { padding: 10px 0 8px; }
  .day-num { font-size: 15px; }
}
</style>
</head>

<body>
<img src="assets/fork-cursor.png" alt="" aria-hidden="true" style="position:fixed; left:-9999px; top:-9999px; width:1px; height:1px; opacity:0; pointer-events:none;" />

<div class="app-shell">

  <!-- ============ Left rail ============ -->
  <aside class="rail">
    <div class="brand">Lunchers Club<span class="sub">Member</span></div>

    <button class="rail-item active" data-page="home">
