<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Lunchers Club</title>
<link rel="preload" as="image" href="assets/fork-cursor.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: #0A0A09;
    --ink: #F4F1EA;
    --muted: #6E6B64;
    --line: #1F1E1B;
    --accent: #F4F1EA;
    --hero-size: 132px;

    --sans: "Inter", ui-sans-serif, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    --display: "Geist", ui-sans-serif, -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    --mono: "Inter", ui-sans-serif, -apple-system, sans-serif;
    --serif: "Instrument Serif", "Iowan Old Style", Georgia, serif;
  }

  [data-theme="light"] {
    --bg: #F4F1EA;
    --ink: #0A0A09;
    --muted: #8F8B82;
    --line: #E5E1D7;
    --accent: #0A0A09;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    transition: background 0.4s ease, color 0.4s ease;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }
  ::selection { background: var(--ink); color: var(--bg); }

  /* Pink fork cursor — applied to everything, beats per-element pointer/default rules */
  *, *::before, *::after {
    cursor: url("assets/fork-cursor.png") 32 4, auto !important;
  }

  /* ============ Page shell ============ */
  .page {
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    position: relative;
  }

  /* subtle film-grain noise overlay */
  .page::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse at 50% 100%,
        color-mix(in oklch, var(--ink) 4%, transparent) 0%,
        transparent 60%);
    pointer-events: none;
    z-index: 1;
  }

  /* ============ Top bar ============ */
  header.bar {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 28px 40px;
    position: relative;
    z-index: 5;
  }
  .bar .left, .bar .right {
    display: flex;
    align-items: center;
    gap: 28px;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .bar .right { justify-content: flex-end; }
  .bar a { transition: color 0.2s ease; padding: 12px 4px; display: inline-flex; align-items: center; }
  .bar a:hover { color: var(--ink); }

  .bar .mark {
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--ink);
    text-align: center;
    line-height: 1.4;
  }
  .bar .mark span {
    display: block;
    color: var(--ink);
    letter-spacing: 0.32em;
    font-size: 12px;
    margin-top: 2px;
  }

  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink);
    margin-right: 8px;
    vertical-align: middle;
    opacity: 0.6;
  }

  /* ============ Hero ============ */
  main.stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 80px 40px 100px;
    position: relative;
    z-index: 2;
  }

  .invite {
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 64px;
    display: inline-flex;
    align-items: center;
    gap: 14px;
  }
  .invite::before, .invite::after {
    content: "";
    width: 22px;
    height: 1px;
    background: currentColor;
    opacity: 0.45;
  }

  .headline {
    font-family: var(--display);
    font-size: clamp(64px, calc(var(--hero-size) * 0.85), var(--hero-size));
    line-height: 0.94;
    letter-spacing: -0.045em;
    font-weight: 500;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    max-width: 1100px;
  }

  /* Slot reel | borderless, lives in the same baseline as "Lunch with" */
  .reel-wrap {
    display: inline-block;
    height: 1em;
    overflow: hidden;
    position: relative;
    /* min-width set dynamically */
  }
  .reel {
    display: flex;
    flex-direction: column;
    transition: transform 0.42s cubic-bezier(.18,.7,.22,1);
    will-change: transform;
  }
  .reel-item {
    height: 1em;
    line-height: 0.94;
    font-weight: 500;
    letter-spacing: -0.045em;
    white-space: nowrap;
    color: var(--ink);
    font-family: var(--display);
  }
  .reel-item.final {
    font-family: var(--serif);
    font-style: italic;
    font-weight: 400;
    letter-spacing: -0.02em;
    color: var(--ink);
  }
  /* soft fade off the top/bottom edges */
  .reel-wrap::before, .reel-wrap::after {
    content: "";
    position: absolute;
    left: 0; right: 0;
    height: 0.16em;
    pointer-events: none;
    z-index: 2;
  }
  .reel-wrap::before {
    top: 0;
    background: linear-gradient(to bottom, var(--bg), transparent);
  }
  .reel-wrap::after {
    bottom: 0;
    background: linear-gradient(to top, var(--bg), transparent);
  }

  /* CTA */
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-top: 96px;
    padding: 20px 36px;
    border-radius: 999px;
    background: var(--ink);
    color: var(--bg);
    font-family: var(--sans);
    font-size: 13.5px;
    font-weight: 500;
    letter-spacing: 0.01em;
    cursor: pointer;
    border: none;
    transition: transform 0.2s ease, background 0.2s ease;
    line-height: 1;
  }
  .cta:hover { transform: translateY(-1px); }
  .cta .arrow { transition: transform 0.25s ease; display: inline-block; }
  .cta:hover .arrow { transform: translateX(4px); }

  .by-application {
    margin-top: 20px;
    font-family: var(--mono);
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* ============ Footer ============ */
  footer.foot {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 28px 40px 36px;
    border-top: 1px solid var(--line);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    position: relative;
    z-index: 2;
  }
  .foot .l, .foot .r {
    display: flex;
    gap: 28px;
  }
  .foot .r { justify-content: flex-end; }
  .foot .c {
    text-align: center;
  }
  .foot a { transition: color 0.2s ease; }
  .foot a:hover { color: var(--ink); }

  /* Mount node for Tweaks panel */
  #tweaks-root { position: relative; z-index: 100; }

  /* ============ Mobile responsive ============ */
  @media (max-width: 768px) {
    :root { --hero-size: 56px; }

    header.bar {
      grid-template-columns: 1fr 1fr;
      padding: 20px 20px;
    }
    .bar .left { display: none; }
    .bar .mark { font-size: 10px; letter-spacing: 0.22em; line-height: 1.3; text-align: left; }
    .bar .mark span { font-size: 10px; letter-spacing: 0.22em; }
    .bar .right { font-size: 11px; }

    main.stage {
      padding: 40px 24px 60px;
    }

    .invite {
      font-size: 9px;
      letter-spacing: 0.24em;
      margin-bottom: 36px;
    }

    .headline {
      font-size: clamp(40px, 12vw, 56px);
      gap: 4px;
    }

    .cta {
      margin-top: 56px;
      padding: 18px 32px;
      font-size: 14px;
    }

    .by-application {
      margin-top: 16px;
      font-size: 10px;
    }

    footer.foot {
      grid-template-columns: 1fr;
      gap: 14px;
      padding: 24px 20px 28px;
      text-align: center;
    }
    .foot .l, .foot .r {
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .foot .c { order: -1; }
  }
</style>
</head>
<body data-theme="dark">
<img src="assets/fork-cursor.png" alt="" aria-hidden="true" style="position:fixed; left:-9999px; top:-9999px; width:1px; height:1px; opacity:0; pointer-events:none;" />

<div class="page">

  <!-- ============ TOP BAR ============ -->
  <header class="bar">
    <div class="left">
      <a href="#members"></a>
    </div>
    <div class="mark">
      Lunchers Club
      <span>
</span>

<!-- Mount node for Tweaks panel -->
<div id="tweaks-root"></div>

<script>
  /* ============ Slot machine reel ============ */
  window.__startReel = null;
  (function() {
    const reel = document.getElementById('reel');
    const reelWrap = document.getElementById('reelWrap');
    const professions = [
      'Entrepreneurs',
      'Artists',
      "VC's",
      'Journalists',
      'Chefs',
      'Architects',
      'Bankers',
      'Designers',
      'Fund partners',
      'Gallery directors',
      'Editors',
      'Anonymous donors',
      'A few founders'
    ];
    const FINAL = 'someone cool';
    let CYCLES = 3;

    function buildItems() {
      const items = [];
      for (let c = 0; c < CYCLES; c++) {
        for (const p of professions) items.push({ text: p, final: false });
      }
      items.push({ text: FINAL, final: true });
      return items;
    }

    let items = buildItems();
    function render() {
      reel.innerHTML = items.map(it =>
        `<span class="reel-item${it.final ? ' final' : ''}">${it.text}</span>`
      ).join('');
    }

    function measure() {
      const els = reel.querySelectorAll('.reel-item');
      let maxW = 0;
      els.forEach(el => {
        const w = el.getBoundingClientRect().width;
        if (w > maxW) maxW = w;
      });
      reelWrap.style.minWidth = (maxW + 8) + 'px';
    }

    function startReel(duration) {
      render();
      requestAnimationFrame(() => {
        measure();
        const itemH = reel.children[0].getBoundingClientRect().height;
        const finalIndex = items.length - 1;
        reel.style.transition = 'none';
        reel.style.transform = 'translateY(0px)';
        void reel.offsetHeight;
        const dur = duration || 5.0;
        reel.style.transition = `transform ${dur}s cubic-bezier(.22,1,.36,1)`;
        reel.style.transform = `translateY(${-finalIndex * itemH}px)`;
      });
    }
    window.__startReel = function(cycles) {
      if (cycles) { CYCLES = cycles; items = buildItems(); }
      startReel();
    };

    if (document.fonts && document.fonts.ready) {
      document.fonts.ready.then(() => setTimeout(() => startReel(), 350));
    } else {
      setTimeout(() => startReel(), 600);
    }

    reelWrap.addEventListener('click', () => startReel(4.0));
    reelWrap.style.cursor = 'pointer';
    reelWrap.title = 'Spin again';

    window.addEventListener('resize', () => measure());
  })();
</script>

<!-- Tweaks panel -->
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "heroSize": 132,
  "spinCycles": 3
}/*EDITMODE-END*/;

function applyTweaks(t) {
  document.body.setAttribute("data-theme", t.theme);
  document.documentElement.style.setProperty("--hero-size", t.heroSize + "px");
}

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    applyTweaks(t);
  }, [t.theme, t.heroSize]);

  React.useEffect(() => {
    if (window.__startReel) window.__startReel(t.spinCycles);
  }, [t.spinCycles]);

  return (
    <TweaksPanel title="Tweaks">
      <TweakSection label="Theme" />
      <TweakRadio label="Mode" value={t.theme}
        options={["dark", "light"]}
        onChange={(v) => setTweak("theme", v)} />

      <TweakSection label="Hero" />
      <TweakSlider label="Headline size" value={t.heroSize}
        min={64} max={200} step={4} unit="px"
        onChange={(v) => setTweak("heroSize", v)} />

      <TweakSection label="Slot machine" />
      <TweakSlider label="Spin cycles" value={t.spinCycles}
        min={1} max={10} step={1}
        onChange={(v) => setTweak("spinCycles", v)} />
      <TweakButton label="Spin again"
        onClick={() => window.__startReel && window.__startReel(t.spinCycles)} />
    </TweaksPanel>
  );
}

applyTweaks(TWEAK_DEFAULTS);
ReactDOM.createRoot(document.getElementById("tweaks-root")).render(<App />);
</script>

</body>
